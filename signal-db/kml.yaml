module_group: kml
description: "KML hands-free phone module messages for Peugeot 407 CAN2004 comfort bus"

messages:
  Msg1A3:
    can_id: 0x1A3
    period_ms: 100
    required_modules: ['kml']
    description: |
      KML / hands-free phone module status.
    encode_body: |
      return [0x80, car.kml.opt << 2, 0x00, 0x00, 0x00, 0x00, 0x00]
    decode_body: |
      if len(data) >= 2:
          car.kml.opt = (data[1] >> 2) & 1

  Msg223:
    can_id: 0x223
    period_ms: 100
    required_modules: ['kml']
    description: |
      KML module data frame.
    encode_body: |
      return [car.kml.bits_223, 0x00, 0x00, 0x00, 0x00, 0x00]
    decode_body: |
      if len(data) >= 1:
          car.kml.bits_223 = data[0]

  Msg323:
    can_id: 0x323
    period_ms: 100
    required_modules: ['kml']
    description: |
      KML module data frame 2 (mostly fixed content).
    class_body: |
      _FIXED = [0x66, 0x08, 0x68, 0x00, 0x02, 0x02, 0x00]
    encode_body: |
      return list(self._FIXED)
    decode_body: |
      if len(data) >= 1:
          car.kml.bits_323 = data[0]
